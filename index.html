<!DOCTYPE html>
<html>
<head>
<title>Birthday Game</title>

<!-- 🎮 PIXEL FONT -->
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Press Start 2P', monospace;
  text-align: center;
  background: #87ceeb;
  margin: 0;
}

/* 🧾 FLASHCARD STYLE */
#box {
  background: white;
  width: 700px;
  margin: 40px auto;
  padding: 25px;
  border-radius: 10px;
  border: 4px solid black;
  box-shadow: 6px 6px 0px black;

  max-height: 80vh;
  overflow-y: auto;
}

img {
  width: 200px;
  display: block;
  margin: auto;
  image-rendering: pixelated;
}

button {
  font-family: 'Press Start 2P', monospace;
  font-size: 12px;
  margin: 8px;
  padding: 10px;
  cursor: pointer;
  border: 3px solid black;
  background: white;
  box-shadow: 3px 3px 0px black;
}

button:active {
  transform: translate(2px,2px);
  box-shadow: 1px 1px 0px black;
}

input {
  font-family: 'Press Start 2P', monospace;
  font-size: 12px;
  padding: 8px;
  border: 3px solid black;
}

/* shake effect */
.shake {
  animation: shake 0.2s infinite;
}

@keyframes shake {
  0% { transform: translate(2px,2px); }
  50% { transform: translate(-2px,-2px); }
  100% { transform: translate(2px,2px); }
}

/* 💰 bottom bar */
.robuxBar {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: black;
  color: white;
  font-size: 10px;
  padding: 10px;
  text-align: center;
}
</style>
</head>

<body>

<div id="box">

<img id="char" src="">

<h2 id="speaker">Gubby</h2>

<p id="text"></p>

<div id="choices"></div>

</div>

<script>
let char = document.getElementById("char");
let text = document.getElementById("text");
let choices = document.getElementById("choices");
let speaker = document.getElementById("speaker");

/* 🔊 SOUND */
let beep = new Audio("https://www.myinstants.com/media/sounds/button.mp3");

function playSound(){
  beep.currentTime = 0;
  beep.play();
}

let playerName = "";
let age = "";

start();

/* ---------------- START ---------------- */

function start() {
  speaker.innerText = "Gubby";
  char.src = "gubby.png";

  say(
  "HAPPY BIRTHDAY PERSON!\n\n" +
  "my name is Itzmegubbehxd!\n" +
  "what's your name?"
  );

  choices.innerHTML = `
    <input id="name">
    <button onclick="setName()">continue</button>
  `;
}

/* 🔊 TEXT FUNCTION */
function say(t){
  playSound();
  text.innerText = t;
}

/* ---------------- NAME ---------------- */

function setName() {
  playerName = document.getElementById("name").value || "you";

  say(
  "oh wow! " + playerName + "\n" +
  "thats a shitty fuck name!\n\n" +
  "are you excited?"
  );

  choices.innerHTML = `
    <button onclick="go()">yes</button>
    <button id="noBtn">no</button>
  `;

  let no = document.getElementById("noBtn");

  no.addEventListener("mouseover", () => {
    no.style.position = "absolute";
    no.style.left = Math.random() * 500 + "px";
    no.style.top = Math.random() * 300 + "px";
  });
}

/* ---------------- PARTYGOOB ---------------- */

function go() {
  speaker.innerText = "Partygoob";
  char.src = "partygoob.png";

  say("HI IM PARTYGOOB!!!\nhow old r u turning?");

  choices.innerHTML = `
    <input id="age">
    <button onclick="setAge()">continue</button>
  `;
}

/* ---------------- AGE ---------------- */

function setAge() {
  age = document.getElementById("age").value || "?";

  say(
  "oh wow!\nyou're becoming old!\n\n" +
  "guess what that means...\n\n" +
  "your gonna have to get a j--- fuck.. i cant say it... anyways wanna be friends!"
  );

  choices.innerHTML = `
    <button onclick="friend(true)">yes</button>
    <button onclick="friend(false)">no</button>
  `;
}

/* ---------------- FRIEND ---------------- */

function friend(ok) {
  say(ok ? "YAY!! BEST FRIENDS!!!!" : "fuck you we're friends anyway.");

  choices.innerHTML = `
    <button onclick="color()">continue</button>
  `;
}

/* ---------------- COLOR ---------------- */

function color() {
  say("whats your favourite color?");

  choices.innerHTML = `
    <button onclick="setColor('red')">red</button>
    <button onclick="setColor('blue')">blue</button>
    <button onclick="setColor('green')">green</button>
    <button onclick="setColor('purple')">purple</button>
  `;
}

function setColor(c) {
  document.body.style.background = c;

  say("wow such a gay color! lIKE Me :3...wink");

  choices.innerHTML = `
    <button onclick="cake()">continue</button>
  `;
}

/* ---------------- CAKE ---------------- */

function cake() {
  speaker.innerText = "Partygoob";
  char.src = "cake.png";

  say(
  "we should party!!!!!!!\n\n" +
  "heres a cake 🎂\n\n" +
  "party?"
  );

  choices.innerHTML = `
    <button onclick="party()">yes</button>
    <button onclick="noParty()">no</button>
  `;
}

/* ---------------- ENDINGS ---------------- */

function party() {
  document.body.style.background = "pink";

  document.body.innerHTML =
  "<h1>🎉 PARTY TIME 🎉</h1>" +
  "<h2>make a gamepass for 1k robux pls</h2>" +
  "<div class='robuxBar'>ok make a gamepass for 1k robux now!</div>";
}

function noParty() {
  document.body.classList.add("shake");
  say("oh... ok...");

  setTimeout(() => ban(), 1000);
}

function ban() {
  document.body.classList.remove("shake");
  speaker.innerText = "BAN HAMMER";
  char.src = "banhammer.png";

  say("⚠ BAN HAMMER APPEARS ⚠");

  choices.innerHTML = `
    <button onclick="banYes()">ban partygoob</button>
    <button onclick="cow()">im a fat cow now</button>
  `;
}

/* 🐄 COW ENDING */
function cow() {
  document.body.innerHTML =
  "<h1>🐄 wow your a cow now</h1>" +
  "<img src='fatcow.png'>" +
  "<div class='robuxBar'>ok make a gamepass for 1k robux now!</div>";
}

function banYes() {
  document.body.innerHTML =
  "<h1>💥 Partygoob got BONKED XD 💥</h1>" +
  "<div class='robuxBar'>ok make a gamepass for 1k robux now!</div>";
}
</script>

</body>
</html>
