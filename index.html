<!DOCTYPE html>
<html>
<head>
<title>Birthday Game</title>

<style>
body {
  font-family: Comic Sans MS;
  text-align: center;
  background: skyblue;
  transition: 1s;
}

/* 🎮 GAME BOX (NOW SCROLLABLE) */
#box {
  background: white;
  width: 700px;
  margin: 40px auto;
  padding: 20px;
  border-radius: 20px;
  box-shadow: 0 0 20px black;

  max-height: 80vh;
  overflow-y: auto;
}

img {
  width: 220px;
  display: block;
  margin: auto;
}

button {
  font-size: 18px;
  margin: 8px;
  padding: 10px;
  cursor: pointer;
}

input {
  font-size: 18px;
  padding: 10px;
}

/* shake effect */
.shake {
  animation: shake 0.3s infinite;
}

@keyframes shake {
  0% { transform: translate(2px,2px); }
  50% { transform: translate(-2px,-2px); }
  100% { transform: translate(2px,2px); }
}

/* 💰 ENDING BAR ONLY */
.robuxBar {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: black;
  color: white;
  font-size: 18px;
  padding: 10px;
  text-align: center;
}
</style>
</head>

<body>

<div id="box">

<img id="char" src="">

<h2 id="speaker">Gubby</h2>

<p id="text"></p>

<div id="choices"></div>

</div>

<script>
let char = document.getElementById("char");
let text = document.getElementById("text");
let choices = document.getElementById("choices");
let speaker = document.getElementById("speaker");

let playerName = "";
let age = "";

start();

/* ---------------- START ---------------- */

function start() {
  speaker.innerText = "Gubby";
  char.src = "gubby.png";

  text.innerHTML =
  "HAPPY BIRTHDAY PERSON!<br><br>" +
  "my name is Itzmegubbehxd!<br>" +
  "and I am your host or whatever idfk<br><br>" +
  "what's your name?";

  choices.innerHTML = `
    <input id="name">
    <button onclick="setName()">continue</button>
  `;
}

/* ---------------- NAME ---------------- */

function setName() {
  playerName = document.getElementById("name").value || "you";

  text.innerHTML =
  "oh wow! " + playerName + "<br>" +
  "that's a shitty fuck name!<br><br>" +
  "are you excited????";

  choices.innerHTML = `
    <button onclick="go()">yes</button>
    <button id="noBtn">no</button>
  `;

  let no = document.getElementById("noBtn");

  no.addEventListener("mouseover", () => {
    no.style.position = "absolute";
    no.style.left = Math.random() * 500 + "px";
    no.style.top = Math.random() * 300 + "px";
  });
}

/* ---------------- PARTYGOOB ---------------- */

function go() {
  speaker.innerText = "Partygoob";
  char.src = "partygoob.png";

  text.innerHTML =
  "HI IM PARTYGOOB!!!<br><br>" +
  "how old r u turning?";

  choices.innerHTML = `
    <input id="age">
    <button onclick="setAge()">continue</button>
  `;
}

/* ---------------- AGE ---------------- */

function setAge() {
  age = document.getElementById("age").value || "?";

  text.innerHTML =
  "oh wow! you're becoming old!<br><br>" +
  "guess what that means...<br><br>" +
  "you will have to have a j-j... j-... sorry I can't say it ;-;";

  choices.innerHTML = `
    <button onclick="friend(true)">yes</button>
    <button onclick="friend(false)">no</button>
  `;
}

/* ---------------- FRIEND ---------------- */

function friend(ok) {
  if(ok){
    text.innerHTML = "YAY!! BEST FRIENDS!!!!";
  } else {
    text.innerHTML = "fine. we're friends anyway.";
  }

  choices.innerHTML = `
    <button onclick="color()">continue</button>
  `;
}

/* ---------------- COLOR ---------------- */

function color() {
  text.innerHTML = "whats your favourite color?";

  choices.innerHTML = `
    <button onclick="setColor('red')">red</button>
    <button onclick="setColor('blue')">blue</button>
    <button onclick="setColor('green')">green</button>
    <button onclick="setColor('purple')">purple</button>
  `;
}

function setColor(c) {
  document.body.style.background = c;

  text.innerHTML =
  "wow what a color! i love it!";

  choices.innerHTML = `
    <button onclick="cake()">continue</button>
  `;
}

/* ---------------- CAKE ---------------- */

function cake() {
  speaker.innerText = "Partygoob";
  char.src = "cake.png";

  text.innerHTML =
  "since we're best friends now we should party!!!!!!!<br><br>" +
  "heres a cake 🎂<br><br>" +
  "would u like to party?";

  choices.innerHTML = `
    <button onclick="party()">yes</button>
    <button onclick="noParty()">no</button>
  `;
}

/* ---------------- ENDINGS ---------------- */

function party() {
  document.body.style.background = "pink";
  char.src = "cake.png";

  document.body.innerHTML =
  "<h1>🎉 PARTY TIME 🎉</h1>" +
  "<h2>make a gamepass for 1k robux pls</h2>" +
  "<div class='robuxBar'>ok make a gamepass for 1k robux now!</div>";
}

function noParty() {
  document.body.classList.add("shake");

  text.innerHTML = "oh... ok...";

  setTimeout(() => {
    ban();
  }, 1000);
}

function ban() {
  document.body.classList.remove("shake");
  speaker.innerText = "BAN HAMMER";
  char.src = "banhammer.png";

  text.innerHTML =
  "⚠ BAN HAMMER APPEARS ⚠";

  choices.innerHTML = `
    <button onclick="banYes()">ban partygoob</button>
    <button onclick="cow()">im a fat cow now</button>
  `;
}

/* 🐄 COW ENDING */
function cow() {
  document.body.innerHTML =
  "<h1>🐄 wow your a cow now</h1>" +
  "<img src='fatcow.png' style='width:300px'>" +
  "<div class='robuxBar'>ok make a gamepass for 1k robux now!</div>";
}

function banYes() {
  document.body.innerHTML =
  "<h1>💥 Partygoob got BONKED 💥</h1>" +
  "<div class='robuxBar'>ok make a gamepass for 1k robux now!</div>";
}
</script>

</body>
</html>
