<!DOCTYPE html>
<html>
<head>
<title>Birthday Game</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Press Start 2P', monospace;
  margin: 0;
  background: #87ceeb;
  overflow: hidden;
}

/* GAME SCREEN */
#game {
  width: 100vw;
  height: 100vh;
  position: relative;
}

/* CHARACTER */
#char {
  width: 220px;
  position: absolute;
  top: 60px;
  left: 50%;
  transform: translateX(-50%);
  image-rendering: pixelated;
}

/* TEXTBOX (POKÉMON STYLE) */
#textbox {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 180px;
  background: white;
  border-top: 6px solid black;
  box-shadow: 0 -6px 0 black;
  padding: 15px;
  box-sizing: border-box;
}

/* SPEAKER NAME */
#speaker {
  font-size: 12px;
  margin-bottom: 10px;
}

/* TEXT */
#text {
  font-size: 10px;
  line-height: 18px;
  white-space: pre-wrap;
}

/* CHOICES */
#choices {
  margin-top: 10px;
}

button, input {
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  border: 3px solid black;
  background: white;
  padding: 8px;
  margin: 4px;
  box-shadow: 3px 3px 0 black;
  cursor: pointer;
}

button:active {
  transform: translate(2px,2px);
  box-shadow: 1px 1px 0 black;
}

/* shake */
.shake {
  animation: shake 0.15s infinite;
}

@keyframes shake {
  0% { transform: translate(2px,2px); }
  50% { transform: translate(-2px,-2px); }
  100% { transform: translate(2px,2px); }
}

/* robux bar */
.robuxBar {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: black;
  color: white;
  font-size: 10px;
  padding: 8px;
  text-align: center;
}
</style>
</head>

<body>

<div id="game">
  <img id="char" src="">
  
  <div id="textbox">
    <div id="speaker">Gubby</div>
    <div id="text"></div>
    <div id="choices"></div>
  </div>
</div>

<audio id="beep" src="https://actions.google.com/sounds/v1/cartoon/pop.ogg"></audio>
  
<script>
let char = document.getElementById("char");
let text = document.getElementById("text");
let choices = document.getElementById("choices");
let speaker = document.getElementById("speaker");
let beep = document.getElementById("beep");

let playerName = "";
let age = "";
let typing = false;

/* SOUND */
function playBeep(){
  beep.currentTime = 0;
  beep.play();
}

/* BUTTON SOUND WRAPPER */
function clickSound(fn){
  return function(){
    playBeep();
    fn();
  }
}

/* TYPEWRITER (POKÉMON STYLE) */
function say(t){
  beep.currentTime = 0;
  let i = 0;
  text.innerText = "";
  typing = true;

  let interval = setInterval(() => {
    text.innerText += t[i];

    // beep per character (light, not spammy)
    if(t[i] !== " " && t[i] !== "\n") {
      beep.currentTime = 0;
      beep.play();
    }

    i++;
    if(i >= t.length){
      clearInterval(interval);
      typing = false;
    }
  }, 25);
}

/* START */
start();

function start() {
  speaker.innerText = "Gubby";
  char.src = "gubby.png";

  say(
  "HAPPY BIRTHDAY PERSON!\n\n" +
  "my name is Itzmegubbehxd!\n" +
  "what's your name?"
  );

  choices.innerHTML = `
    <input id="name">
    <button onclick="setName()">continue</button>
  `;
}

/* NAME */
function setName() {
  playBeep();

  playerName = document.getElementById("name").value || "you";

  say(
  "oh wow! " + playerName + "\n" +
  "thats a shitty fuck name!\n\n" +
  "are you excited?"
  );

  choices.innerHTML = `
    <button onclick="go()">yes</button>
    <button id="noBtn">no</button>
  `;

  let no = document.getElementById("noBtn");

  no.addEventListener("mouseover", () => {
    playBeep();
    no.style.position = "absolute";
    no.style.left = Math.random() * 500 + "px";
    no.style.top = Math.random() * 300 + "px";
  });
}

/* PARTYGOOB */
function go() {
  speaker.innerText = "Partygoob";
  char.src = "partygoob.png";

  say("HI IM PARTYGOOB!!!\nhow old r u turning?");

  choices.innerHTML = `
    <input id="age">
    <button onclick="setAge()">continue</button>
  `;
}

/* AGE */
function setAge() {
  playBeep();

  age = document.getElementById("age").value || "?";

  say(
  "oh wow!\nyou're becoming old!\n\n" +
  "guess what that means...\n\n" +
  "your gonna have to get a j--- fuck.. i cant say it... anyways wanna be friends!"
  );

  choices.innerHTML = `
    <button onclick="friend(true)">yes</button>
    <button onclick="friend(false)">no</button>
  `;
}

/* FRIEND */
function friend(ok) {
  playBeep();

  say(ok ? "YAY!! BEST FRIENDS!!!!" : "fuck you we're friends anyway.");

  choices.innerHTML = `
    <button onclick="color()">continue</button>
  `;
}

/* COLOR */
function color() {
  playBeep();

  say("whats your favourite color?");

  choices.innerHTML = `
    <button onclick="setColor('red')">red</button>
    <button onclick="setColor('blue')">blue</button>
    <button onclick="setColor('green')">green</button>
    <button onclick="setColor('purple')">purple</button>
  `;
}

function setColor(c) {
  playBeep();

  document.body.style.background = c;

  say("wow such a gay color! lIKE Me :3...wink");

  choices.innerHTML = `
    <button onclick="cake()">continue</button>
  `;
}

/* CAKE */
function cake() {
  speaker.innerText = "Partygoob";
  char.src = "cake.png";

  say(
  "we should party!!!!!!!\n\n" +
  "heres a cake 🎂\n\n" +
  "party?"
  );

  choices.innerHTML = `
    <button onclick="party()">yes</button>
    <button onclick="noParty()">no</button>
  `;
}

/* ENDINGS */
function party() {
  playBeep();

  document.body.style.background = "pink";

  document.body.innerHTML =
  "<h1>🎉 PARTY TIME 🎉</h1>" +
  "<h2>make a gamepass for 1k robux pls</h2>" +
  "<div class='robuxBar'>ok make a gamepass for 1k robux now!</div>";
}

function noParty() {
  playBeep();

  document.body.classList.add("shake");

  say("oh... ok...");

  setTimeout(() => ban(), 1000);
}

function ban() {
  document.body.classList.remove("shake");

  speaker.innerText = "BAN HAMMER";
  char.src = "banhammer.png";

  say("⚠ BAN HAMMER APPEARS ⚠");

  choices.innerHTML = `
    <button onclick="banYes()">ban partygoob</button>
    <button onclick="cow()">im a fat cow now</button>
  `;
}

/* COW */
function cow() {
  playBeep();

  document.body.innerHTML =
  "<h1>🐄 wow your a cow now</h1>" +
  "<img src='fatcow.png'>" +
  "<div class='robuxBar'>ok make a gamepass for 1k robux now!</div>";
}

function banYes() {
  playBeep();

  document.body.innerHTML =
  "<h1>💥 Partygoob got BONKED XD 💥</h1>" +
  "<div class='robuxBar'>ok make a gamepass for 1k robux now!</div>";
}
</script>

</body>
</html>
