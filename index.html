  <!DOCTYPE html>
<html>
<head>
<title>Birthday Game</title>

<style>
body {
  font-family: Comic Sans MS;
  text-align: center;
  background: skyblue;
  transition: 1s;
  overflow: hidden;
}

#box {
  background: white;
  width: 700px;
  margin: 40px auto;
  padding: 20px;
  border-radius: 20px;
  box-shadow: 0 0 20px black;
}

img {
  width: 180px;
  display: block;
  margin: auto;
}

button {
  font-size: 18px;
  margin: 8px;
  padding: 10px;
  cursor: pointer;
}

input {
  font-size: 18px;
  padding: 10px;
}

.shake {
  animation: shake 0.3s infinite;
}

@keyframes shake {
  0% { transform: translate(2px,2px); }
  50% { transform: translate(-2px,-2px); }
  100% { transform: translate(2px,2px); }
}
</style>
</head>

<body>

<div id="box">

<img id="char" src="">

<h2 id="speaker">Gubby</h2>

<p id="text"></p>

<div id="choices"></div>

</div>

<script>
let char = document.getElementById("char");
let text = document.getElementById("text");
let choices = document.getElementById("choices");
let speaker = document.getElementById("speaker");

let playerName = "";
let age = "";

start();

/* ---------------- INTRO ---------------- */

function start() {
  char.src = "";
  speaker.innerText = "Gubby";

  text.innerHTML =
  "HAPPY BIRTHDAY PERSON!<br><br>" +
  "my name is Itzmegubbehxd!<br>" +
  "and i am ur host or whatever idfk<br><br>" +
  "what's your name?";

  choices.innerHTML = `
    <input id="name">
    <button onclick="setName()">continue</button>
  `;
}

/* ---------------- NAME ---------------- */

function setName() {
  playerName = document.getElementById("name").value || "you";

  text.innerHTML =
  "oh wow! " + playerName + "<br>" +
  "thats a shitty fuck name!<br><br>" +
  "anyways you will answer questions for your birthday PRIZE!!!!!<br><br>" +
  "are you excited????";

  choices.innerHTML = `
    <button onclick="go()">yes</button>
    <button id="noBtn">no</button>
  `;

  let no = document.getElementById("noBtn");

  no.addEventListener("mouseover", () => {
    no.style.position = "absolute";
    no.style.left = Math.random() * 500 + "px";
    no.style.top = Math.random() * 300 + "px";
  });
}

/* ---------------- PARTYGOOB ---------------- */

function go() {
  speaker.innerText = "Partygoob";

  text.innerHTML =
  "HI IM PARTYGOOB!!!<br><br>" +
  "how old r u turning?";

  choices.innerHTML = `
    <input id="age">
    <button onclick="setAge()">continue</button>
  `;
}

/* ---------------- AGE ---------------- */

function setAge() {
  age = document.getElementById("age").value || "?";

  text.innerHTML =
  "oh wow! you're becoming old!<br>" +
  "guess what that means!<br><br>" +
  "you will have to have a j-j.... j-..<br><br>" +
  "sorry. its my trigger word i cant really say it but you know what i mean ;-;";

  choices.innerHTML = `
    <button onclick="friend(true)">yes</button>
    <button onclick="friend(false)">no</button>
  `;
}

/* ---------------- FRIEND ---------------- */

function friend(ok) {
  if(ok){
    text.innerHTML = "YAY!! BEST FRIENDS!!!!";
  } else {
    text.innerHTML = "fuck you were becoming friends anyway";
  }

  choices.innerHTML = `
    <button onclick="color()">continue</button>
  `;
}

/* ---------------- COLOR ---------------- */

function color() {
  text.innerHTML =
  "whats ur favourite color?";

  choices.innerHTML = `
    <button onclick="setColor('red')">red</button>
    <button onclick="setColor('blue')">blue</button>
    <button onclick="setColor('green')">green</button>
    <button onclick="setColor('purple')">purple</button>
  `;
}

function setColor(c) {
  document.body.style.background = c;

  text.innerHTML =
  "wow what a color! i love it!<br><br>" +
  "because im gay ofc. heh maybe we could yk... mingle sometime soon";

  choices.innerHTML = `
    <button onclick="cake()">continue</button>
  `;
}

/* ---------------- CAKE / END ---------------- */

function cake() {
  speaker.innerText = "Partygoob";

  text.innerHTML =
  "since were best friends now we should party!!!!!!!<br><br>" +
  "heres a cake! 🎂<br><br>" +
  "would u like to party?";

  choices.innerHTML = `
    <button onclick="party()">yes</button>
    <button onclick="noParty()">no</button>
  `;
}

/* ---------------- ENDINGS ---------------- */

function party() {
  document.body.style.background = "pink";

  text.innerHTML =
  "🎉 PARTY TIME 🎉<br><br>" +
  "ok time to give u ur robux<br>" +
  "make a gamepass for 1k robux pls";

  choices.innerHTML = `<h2>THE END</h2>`;
}

function noParty() {
  document.body.classList.add("shake");

  text.innerHTML =
  "oh... ok...";

  setTimeout(() => {
    ban();
  }, 1000);
}

function ban() {
  text.innerHTML =
  "BAN HAMMER APPEARS ⚠";

  choices.innerHTML = `
    <button onclick="banYes()">ban partygoob</button>
    <button onclick="cow()">im a fat big cow</button>
  `;
}

function banYes() {
  document.body.classList.remove("shake");

  document.body.innerHTML =
  "<h1>💥 partygoob got bonked 💥<br><br>game over</h1>";
}

function cow() {
  document.body.innerHTML =
  "<h1>🐄 MOOOOOOOOOOOOOOO</h1>";
}
</script>

</body>
</html>
